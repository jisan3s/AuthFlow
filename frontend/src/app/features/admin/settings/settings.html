<div class="card border-0 shadow-sm p-4">
    <h4 class="mb-1">Account Settings</h4>
    <p class="text-muted mb-4">Review your current admin session and sign out securely.</p>

    <div class="row g-3 mb-4">
        <div class="col-md-6">
            <div class="border rounded-3 p-3 h-100">
                <small class="text-uppercase text-muted">Name</small>
                <div class="fs-5">{{ currentUser()?.name || 'Main Admin' }}</div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="border rounded-3 p-3 h-100">
                <small class="text-uppercase text-muted">Email</small>
                <div class="fs-5">{{ currentUser()?.email }}</div>
            </div>
        </div>
    </div>

    <button type="button" class="btn btn-outline-danger" (click)="logout()">Logout</button>
</div>
