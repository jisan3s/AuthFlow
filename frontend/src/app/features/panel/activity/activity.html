<div class="card border-0 shadow-sm p-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h4 class="mb-1">Activity Feed</h4>
            <p class="text-muted mb-0">Chronological system activity visible to admin operators.</p>
        </div>
        @if (loading) {
            <span class="text-muted">Loading...</span>
        }
    </div>

    <table class="table align-middle">
        <thead>
            <tr>
                <th>Action</th>
                <th>Date</th>
            </tr>
        </thead>
        <tbody>
            @for (activity of activities; track activity._id) {
                <tr>
                    <td>{{ activity.action }}</td>
                    <td>{{ activity.createdAt | date:'short' }}</td>
                </tr>
            } @empty {
                <tr>
                    <td colspan="2" class="text-center text-muted">No activity records found.</td>
                </tr>
            }
        </tbody>
    </table>
</div>
