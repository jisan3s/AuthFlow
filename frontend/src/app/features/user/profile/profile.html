<div class="card border-0 shadow-sm p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="mb-1">Profile</h4>
            <p class="text-muted mb-0">Your current account information.</p>
        </div>
        <span class="badge text-bg-dark">{{ currentUser()?.role }}</span>
    </div>

    <div class="row g-3">
        <div class="col-md-6">
            <div class="border rounded-3 p-3 h-100">
                <small class="text-uppercase text-muted">Full Name</small>
                <div class="fs-5">{{ currentUser()?.name || 'Not set' }}</div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="border rounded-3 p-3 h-100">
                <small class="text-uppercase text-muted">Email Address</small>
                <div class="fs-5">{{ currentUser()?.email }}</div>
            </div>
        </div>
    </div>
</div>
