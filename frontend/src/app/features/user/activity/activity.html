<div class="card p-4">
    <div class="d-flex justify-content-between align-items-center">
        <h4 class="mb-0">My Activity</h4>
        @if (loading) {
            <span class="text-muted">Loading...</span>
        }
    </div>

    @if (error) {
        <div class="alert alert-danger mt-3 mb-0">{{ error }}</div>
    }

    <table class="table mt-3">
        <thead>
            <tr>
                <th>Action</th>
                <th>Details</th>
                <th>Date</th>
            </tr>
        </thead>

        <tbody>
            @for (item of activities; track item._id) {
                <tr>
                    <td>{{ item.action }}</td>
                    <td>{{ formatMeta(item.meta) || 'No details' }}</td>
                    <td>{{ item.createdAt | date:'short' }}</td>
                </tr>
            } @empty {
                <tr>
                    <td colspan="3" class="text-center text-muted">No activity found yet.</td>
                </tr>
            }
        </tbody>
    </table>
</div>
